name: PR
on:
  pull_request:

jobs:
  test:
    name: 'Terragrunt'
    runs-on: ubuntu-latest
    env:
      TF_VERSION: '1.0.11'
      TG_VERSION: '0.35.13'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Terragrunt
        uses: autero1/action-terragrunt@v3.0.2
        with:
          terragrunt-version: ${{ env.TG_VERSION }}
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false
          terraform_version: ${{ env.TF_VERSION }}
      - name: Plan all
        run: |
          cd example_project
          terragrunt run-all plan
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm install
      - run: npm run build
      - name: Report plans with pretty name
        uses: ./
        with:
          pretty_name_regex: '/example_project/?(\w+)?/(\w+).diff'
          pretty_name_separator: '/'
      - name: Report plans with default name
        uses: ./

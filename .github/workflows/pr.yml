name: PR
on:
  pull_request:

permissions:
  checks: write
  contents: read

jobs:
  test:
    name: 'Terragrunt'
    runs-on: ubuntu-latest
    env:
      TF_VERSION: '1.13.5'
      TG_VERSION: '0.93.8'
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false
          terraform_version: ${{ env.TF_VERSION }}
      - name: Setup Terragrunt
        run: |
          curl -fsSL "https://github.com/gruntwork-io/terragrunt/releases/download/v${{ env.TG_VERSION }}/terragrunt_linux_amd64" \
            -o /usr/local/bin/terragrunt
          chmod +x /usr/local/bin/terragrunt
          terragrunt --version
      - name: Plan all
        run: |
          cd example_project
          terragrunt run --all plan --non-interactive
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - name: Report plans
        uses: ./
        with:
          pretty_name_regex: '/example_project/([\w/]+)/(\w+)\.diff'
          pretty_name_separator: '/'
